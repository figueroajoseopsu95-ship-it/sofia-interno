upstream frontend {
    server sofia-frontend:3000;
}

upstream backend {
    server sofia-backend:4000;
}

# --------------------------------------------------
# HTTP server (port 80)
# --------------------------------------------------
server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # --------------------------------------------------
    # Backend API  (/api/*)
    # CORS headers for cross-origin requests (Control Center :3100 -> :80)
    # --------------------------------------------------
    location /api/ {
        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass         http://backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # CORS headers on actual responses
        add_header 'Access-Control-Allow-Origin' $http_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }

    # --------------------------------------------------
    # WebSocket — Socket.IO  (/socket.io/*)
    # --------------------------------------------------
    location /socket.io/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --------------------------------------------------
    # n8n webhooks (external — Google Chat, etc.)
    # --------------------------------------------------
    location /webhook/ {
        proxy_pass         http://sofia-n8n:5678;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # --------------------------------------------------
    # Frontend — Next.js (default catch-all)
    # --------------------------------------------------
    location / {
        proxy_pass         http://frontend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# --------------------------------------------------
# HTTPS server (port 443) — activado por entrypoint.sh
# Solo se incluye si existen los certificados SSL
# --------------------------------------------------
# NOTA: Este bloque se habilita automaticamente por el
# entrypoint cuando los certificados SSL existen.
# Ver nginx/ssl.conf.template
