# ============================================
# SOFIA — Production Docker Compose
# ============================================
# Uso:
#   1. Copiar .env.example → .env
#   2. Completar las variables en .env
#   3. docker compose up -d --build
# ============================================

services:
  # ---- PostgreSQL + pgvector ----
  sofia-postgres:
    build:
      context: ./sofia-backend/prisma
      dockerfile: Dockerfile.postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - sofia_pgdata:/var/lib/postgresql/data
    networks:
      - sofia-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis ----
  sofia-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - sofia-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- NestJS Backend ----
  sofia-backend:
    build:
      context: ./sofia-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@sofia-postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_HOST: sofia-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      N8N_BASE_URL: http://sofia-n8n:5678
      N8N_WEBHOOK_URL: http://sofia-n8n:5678/webhook/sofia-router
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
    depends_on:
      sofia-postgres:
        condition: service_healthy
      sofia-redis:
        condition: service_healthy
    networks:
      - sofia-network

  # ---- n8n Workflow Engine ----
  sofia-n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_DATABASE: sofia_n8n_db
      DB_POSTGRESDB_HOST: sofia-postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_AUTH_PASSWORD}
      WEBHOOK_URL: ${PUBLIC_URL}/webhook/
      N8N_HOST: "0.0.0.0"
      N8N_PORT: "5678"
      N8N_PROTOCOL: "http"
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      N8N_COMMUNITY_EDITION_FEATURES_ENABLED: "true"
      EXECUTIONS_PROCESS: "main"
      N8N_LOG_LEVEL: "info"
    depends_on:
      sofia-postgres:
        condition: service_healthy
    volumes:
      - sofia_n8n_data:/home/node/.n8n
    networks:
      - sofia-network

  # ---- Next.js Frontend (empleados) ----
  sofia-frontend:
    build:
      context: ./sofia-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
        NEXT_PUBLIC_WS_URL: ""
    restart: unless-stopped
    networks:
      - sofia-network

  # ---- Next.js Control Center (admin) ----
  sofia-control-center:
    build:
      context: ./sofia-control-center
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_URL}/api/v1/control
        NEXT_PUBLIC_WS_URL: ${PUBLIC_URL}
        NEXT_PUBLIC_CORE_URL: ${PUBLIC_URL}/api/v1
    restart: unless-stopped
    ports:
      - "3100:3000"
    networks:
      - sofia-network

  # ---- Nginx Reverse Proxy ----
  sofia-nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NGINX_HOST: ${NGINX_HOST:-srv910634.hstgr.cloud}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    depends_on:
      - sofia-frontend
      - sofia-backend
    networks:
      - sofia-network

  # ---- Certbot (SSL certificates) ----
  sofia-certbot:
    image: certbot/certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --quiet; done'"
    networks:
      - sofia-network

networks:
  sofia-network:
    driver: bridge

volumes:
  sofia_pgdata:
  sofia_n8n_data:
  letsencrypt:
  certbot_webroot:
